<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08090c">
  <title>Pilotage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/app.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body>
  <!-- Écran de login (affiché si pas de session) -->
  <div id="login" class="login hide"></div>

  <!-- Coquille de l'app (affichée si session) -->
  <div id="app" class="app hide" data-accent>
    <header class="appbar">
      <div class="appbar__titles" id="appbar-titles"></div>
      <button class="plus-btn" id="plus-btn" aria-label="Plus de modules">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
        </svg>
      </button>
    </header>

    <main id="view" class="scroll"></main>

    <nav class="tabbar" id="tabbar"></nav>
  </div>

  <!-- Calque de feuille de saisie (FAB) — structure prête, branchée aux étapes suivantes -->
  <div id="scrim" class="scrim" hidden></div>
  <div id="sheet" class="sheet" hidden></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
